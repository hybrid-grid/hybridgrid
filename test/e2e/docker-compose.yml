services:
  coordinator:
    build:
      context: ../..
      dockerfile: test/e2e/Dockerfile.worker
      args:
        VERSION: dev
        COMMIT: local
        BUILD_TIME: ${BUILD_TIME:-unknown}
    command: hg-coord serve --grpc-port=9000 --http-port=8080
    ports:
      - "9000:9000"
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - hg-e2e-net

  worker-1:
    build:
      context: ../..
      dockerfile: test/e2e/Dockerfile.worker
      args:
        VERSION: dev
        COMMIT: local
        BUILD_TIME: ${BUILD_TIME:-unknown}
    hostname: worker-1
    command: hg-worker serve --coordinator=coordinator:9000 --port=50052 --http-port=9090 --advertise-address=worker-1:50052 --max-parallel=4
    ports:
      - "9091:9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      coordinator:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - hg-e2e-net

  worker-2:
    build:
      context: ../..
      dockerfile: test/e2e/Dockerfile.worker
      args:
        VERSION: dev
        COMMIT: local
        BUILD_TIME: ${BUILD_TIME:-unknown}
    hostname: worker-2
    command: hg-worker serve --coordinator=coordinator:9000 --port=50052 --http-port=9090 --advertise-address=worker-2:50052 --max-parallel=4
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      coordinator:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - hg-e2e-net

networks:
  hg-e2e-net:
    driver: bridge
