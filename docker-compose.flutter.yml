# Flutter Worker — Docker Compose for local testing
#
# Usage:
#   docker compose -f docker-compose.flutter.yml up -d
#   docker compose -f docker-compose.flutter.yml down
#
# This spins up a Flutter worker that connects to an existing coordinator.
# The coordinator must already be running (e.g. from docker-compose.yml).

services:
  flutter-worker:
    build:
      context: .
      dockerfile: build/docker/flutter/Dockerfile
      args:
        FLUTTER_VERSION: "3.19.6"
    image: hybridgrid/flutter-android:3.19.6
    container_name: hg-flutter-worker
    hostname: hg-flutter-worker
    command: ["tail", "-f", "/dev/null"]
    environment:
      - HG_LOG_LEVEL=debug
      - FLUTTER_ROOT=/opt/flutter
      - ANDROID_SDK_ROOT=/opt/flutter/bin/cache/android-sdk
      - ANDROID_HOME=/opt/flutter/bin/cache/android-sdk
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-arm64
    healthcheck:
      test: ["CMD-SHELL", "flutter --version"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - hybridgrid
    restart: unless-stopped

networks:
  hybridgrid:
    name: hybridgrid
    external: true
